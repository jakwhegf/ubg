<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Word Search Puzzle Game</title>
    <script src="./vendor/playgama-bridge.js"></script>
    <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css">
<style>
      body {
        background-color: #0a192f;
        overflow-x: hidden;
        /* Prevent pull-to-refresh and other mobile browser behaviors */
        overscroll-behavior-y: none;
        overscroll-behavior-x: auto;
      }
      
      html {
        overscroll-behavior-y: none;
        overscroll-behavior-x: auto;
        height: 100%;
      }
      
      #root {
        height: 100vh;
        overscroll-behavior-y: none;
      }

      /* --- Animated Background --- */
      .particle-container {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100vh;
          z-index: 0;
          pointer-events: none;
          overflow: hidden;
      }
      .particle {
          position: absolute;
          background-color: rgba(100, 150, 255, 0.2);
          border-radius: 50%;
          animation: float 25s infinite linear;
      }
      @keyframes float {
          0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
          10% { opacity: 1; }
          90% { opacity: 1; }
          100% { transform: translateY(-10vh) rotate(360deg); opacity: 0;}
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
      }

      .shake {
        animation: shake 0.5s ease-in-out;
      }

      @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.4); }
        100% { transform: scale(1); }
      }

      .pop {
        animation: pop 0.5s ease-in-out;
      }

      /* --- Entrance Animations --- */
      @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(30px); }
          to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
          from { opacity: 0; transform: scale(0.9); }
          to { opacity: 1; transform: scale(1); }
      }

      .animate-fadeInUp { animation: fadeInUp 0.8s ease-out forwards; }
      .animate-scaleIn { animation: scaleIn 0.8s ease-out forwards; }
      
      /* --- Title Animation --- */
      @keyframes letter-pop-in {
          0% { transform: scale(0); opacity: 0; }
          80% { transform: scale(1.2); opacity: 1; }
          100% { transform: scale(1); opacity: 1; }
      }
      .title-char {
          display: inline-block;
          opacity: 0;
          animation: letter-pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* --- Loader --- */
      .loader-grid {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 8px;
      }
      .loader-cell {
          width: 2.5rem;
          height: 2.5rem;
          background-color: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 6px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: bold;
          font-size: 1.5rem;
          color: #94a3b8;
          transition: all 0.1s ease-in-out;
      }

      /* --- Progress Bar --- */
      @keyframes progress-bar-anim {
          0% { width: 0%; }
          100% { width: 100%; }
      }
      .progress-bar-inner {
          animation: progress-bar-anim 2s ease-out forwards;
      }

      /* --- Orientation Lock --- */
      #orientation-lock-container {
          display: none; /* Hidden by default */
          position: fixed;
          inset: 0;
          background-color: #0a192f;
          z-index: 100;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
          color: white;
          padding: 1rem;
      }
      #orientation-lock-container .icon {
          font-size: 5rem;
          margin-bottom: 1.5rem;
          animation: rotate-anim 2.5s infinite ease-in-out;
      }
      @keyframes rotate-anim {
          0% { transform: rotate(0deg); }
          25% { transform: rotate(-90deg); }
          50% { transform: rotate(-90deg); }
          75% { transform: rotate(0deg); }
          100% { transform: rotate(0deg); }
      }
       #orientation-lock-container h2 {
          font-size: 1.5rem;
          font-weight: bold;
          margin-bottom: 0.5rem;
      }
       #orientation-lock-container p {
          font-size: 1rem;
          color: #cbd5e1; /* slate-300 */
      }

      /* Show the lock screen only on small devices in landscape mode */
      @media screen and (orientation: landscape) and (max-height: 600px) {
          #app-container {
              display: none;
          }
          #orientation-lock-container {
              display: flex;
          }
      }

      /* Additional responsive styles for better grid scaling */
      @media (max-width: 640px) {
          .loader-cell {
              width: 2rem;
              height: 2rem;
              font-size: 1.25rem;
          }
      }

      /* Ensure proper viewport behavior */
      #root {
          width: 100%;
          height: 100vh;
          overflow: hidden;
      }

      #app-container {
          width: 100%;
          height: 100%;
          min-height: 100vh;
          position: relative;
      }

      /* Grid container sizing to match header width */
      .game-grid-container {
          max-width: 42rem; /* Same as max-w-2xl */
          width: 100%;
          margin: 0 auto;
          box-sizing: border-box;
      }

      /* Responsive grid adjustments */
      @media (max-width: 768px) {
          .game-grid-container {
              max-width: calc(100vw - 2rem);
              max-height: calc(100vh - 16rem);
          }
      }

      @media (max-height: 700px) {
          .game-grid-container {
              max-height: calc(100vh - 14rem);
          }
      }

      @media (max-height: 600px) {
          .game-grid-container {
              max-height: calc(100vh - 12rem);
          }
      }

      /* Ensure grid doesn't overflow on very large grids */
      @media (orientation: portrait) {
          .game-grid-container {
              max-width: min(42rem, calc(100vw - 2rem));
              max-height: calc(100vh - 18rem);
          }
      }

      @media (orientation: landscape) and (max-height: 500px) {
          .game-grid-container {
              max-height: calc(100vh - 10rem);
              max-width: calc(100vh - 10rem);
          }
      }
    </style>

  <body class="text-white">
    <div id="root"></div>

    <script>
      // Prevent pull-to-refresh only, allow all interactive elements
      document.addEventListener('touchmove', function(e) {
        // Allow all touch moves on interactive elements (buttons, inputs, game elements)
        if (e.target.closest('button') || 
            e.target.closest('input') || 
            e.target.closest('select') ||
            e.target.closest('[role="button"]') ||
            e.target.closest('.cursor-pointer') ||
            e.target.closest('[data-game-grid]') ||
            e.target.closest('#app-container')) {
          return;
        }
        
        // Only prevent pull-to-refresh when at top of page and dragging down
        if (window.scrollY <= 0 && e.touches.length === 1) {
          const touch = e.touches[0];
          const startY = touch.clientY;
          
          // Only prevent if dragging down from very top of screen
          if (startY < 50) {
            e.preventDefault();
          }
        }
      }, { passive: false });
      
      // Prevent overscroll bounce
      document.addEventListener('scroll', function(e) {
        if (window.scrollY < 0) {
          window.scrollTo(0, 0);
        }
      });
    </script>
  </body>
</html>
