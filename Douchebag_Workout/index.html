    <!-- Unlock GameDistribution domain lock: chặn blocked.min.js, block API, xóa overlay nếu có -->
    <script>
    (function(){
        function blockScript(src) {
            return typeof src === 'string' && /blocked|gdsdk-blocked|gamedistribution\.com\/block/i.test(src);
        }
        var origAppend = Node.prototype.appendChild;
        Node.prototype.appendChild = function(el) {
            if (el && el.tagName === 'SCRIPT' && el.src && blockScript(el.src)) return el;
            if (el && el.id === 'gamedistribution-jssdkblocked') return el;
            return origAppend.apply(this, arguments);
        };
        var origInsertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(el, ref) {
            if (el && el.tagName === 'SCRIPT' && el.src && blockScript(el.src)) return el;
            if (el && el.id === 'gamedistribution-jssdkblocked') return el;
            return origInsertBefore.apply(this, arguments);
        };
        var _f = window.fetch;
        if (_f) window.fetch = function(u, o) {
            var url = typeof u === 'string' ? u : (u && u.url) || '';
            if (/gamedistribution\.com.*block|html5\.api\.gamedistribution/i.test(url))
                return Promise.resolve(new Response('{"allowed":true}', { status: 200 }));
            return _f.apply(this, arguments);
        };
        var X = XMLHttpRequest;
        if (X) {
            window.XMLHttpRequest = function() {
                var x = new X();
                var open = x.open;
                x.open = function(m, url) {
                    if (/gamedistribution\.com.*block|html5\.api\.gamedistribution/i.test(url || '')) {
                        x._blockUrl = url;
                        return;
                    }
                    return open.apply(this, arguments);
                };
                var send = x.send;
                x.send = function() {
                    if (x._blockUrl) {
                        setTimeout(function() {
                            x.readyState = 4;
                            x.status = 200;
                            x.responseText = '{"allowed":true}';
                            try { x.onreadystatechange && x.onreadystatechange(); } catch(e){}
                            try { x.onload && x.onload({target:x}); } catch(e){}
                            try { x.dispatchEvent && x.dispatchEvent(new Event('load')); } catch(e){}
                        }, 0);
                        return;
                    }
                    return send.apply(this, arguments);
                };
                return x;
            };
        }
        function removeBlock() {
            var b = document.getElementById('gdsdk-blocked__') || document.querySelector('.gdsdk-blocked__');
            if (b) { b.remove(); }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', removeBlock);
        } else { removeBlock(); }
        new MutationObserver(removeBlock).observe(document.body || document.documentElement, { childList: true, subtree: true });
    })();
    </script>
    <!-- Fix AudioContext: trình duyệt yêu cầu user gesture trước khi phát âm thanh -->
    <script>
    (function(){
        var contexts = [];
        var C = window.AudioContext || window.webkitAudioContext;
        if (C) {
            var Orig = C;
            window.AudioContext = window.webkitAudioContext = function() {
                var ctx = new Orig();
                contexts.push(ctx);
                return ctx;
            };
        }
        function resumeAll() {
            contexts.forEach(function(ctx){
                if (ctx && ctx.state === 'suspended' && ctx.resume) ctx.resume().catch(function(){});
            });
        }
        ['click','touchstart','keydown'].forEach(function(ev){
            document.addEventListener(ev, resumeAll, { once: true, capture: true });
        });
        window._resumeAudio = resumeAll;
    })();
    </script>
    <!-- IMA SDK: tag từ ads/tag manager.txt (chạy apply_ads_tag.py để cập nhật) -->
    <script>
    (function(){
        var VAST_TAG = "https://pubads.g.doubleclick.net/gampad/ads?iu=/23136362493/ads-video-main&description_url=http%3A%2F%2Fcool2fun.guthub.io&tfcd=0&npa=0&sz=640x480&gdfp_req=1&unviewed_position_start=1&output=vast&env=vp&impl=s&correlator=";
        window.adTagUrl = window.AD_TAG_URL = window.imaAdTag = window.vastTag = window.adsTag = VAST_TAG;
        Object.defineProperty(window, "adTag", { get: function(){ return VAST_TAG; }, configurable: true });
        var _fetch = window.fetch;
        if (_fetch) {
            window.fetch = function(url, opts) {
                var u = typeof url === "string" ? url : (url && url.url);
                if (u && /vast|gampad|doubleclick|pubads|ima/i.test(u)) return _fetch(VAST_TAG, opts);
                return _fetch.apply(this, arguments);
            };
        }
        var _XHO = window.XMLHttpRequest;
        if (_XHO) {
            window.XMLHttpRequest = function() {
                var xhr = new _XHO();
                var orig = xhr.open;
                xhr.open = function(m, url) {
                    var args = Array.prototype.slice.call(arguments);
                    if (typeof url === "string" && /vast|gampad|doubleclick|pubads|ima/i.test(url))
                        args[1] = VAST_TAG;
                    return orig.apply(this, args);
                };
                return xhr;
            };
        }
        function patchIMA() {
            try {
                if (window.google && window.google.ima && window.google.ima.AdsLoader && !window.google.ima.AdsLoader._tagPatched) {
                    window.google.ima.AdsLoader._tagPatched = true;
                    var orig = window.google.ima.AdsLoader.prototype.requestAds;
                    if (orig) {
                        window.google.ima.AdsLoader.prototype.requestAds = function(request) {
                            if (request && request.adTagUrl) request.adTagUrl = VAST_TAG;
                            return orig.apply(this, arguments);
                        };
                    }
                }
            } catch(e) {}
        }
        document.addEventListener("DOMContentLoaded", patchIMA);
        setTimeout(patchIMA, 1000);
        setInterval(patchIMA, 800);
    })();
    </script>
