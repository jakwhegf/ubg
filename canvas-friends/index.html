  if ( typeof Promise === "undefined") {
    window.alert('On no! You need a modern browser to play this game.');
  }
  
  function loadModal() {
    return tf.loadFrozenModel(MODEL_URL, WEIGHTS_URL);
  }

  $(document).ready(function() {
    loadModal().then(function(m) {
      model = m;
    })
  });

  function classify(result) {
    var tensor = tf.fromPixels(result)
    tensor = tf.cast(tensor, "float32");

    var offset = tf.scalar(127.5);
    // Normalize the image from [0, 255] to [-1, 1].
    var normalized = tensor.sub(offset).div(offset);

    // Reshape to a single-element batch so we can pass it to predict.
    var batched = normalized.reshape([1, 224, 224, 3]);

    var logits = model.execute({input: batched});
    return logits.data();
  }

  for (var i = 1; i < 11; i++) {
    var randColor = randomColor();
    $('#color' + i).css({ background: randColor });
    $('#color' + i).data({ color: randColor });
  }

  canvas = new fabric.Canvas('c', {
    isDrawingMode: true
  });
  canvas.hoverCursor = 'pointer';

  canvas.on('object:added', function(e) {
    if (e.target && e.target.path) {
      undoCount = 0;;
    }
  });

  $('.canvas-container').css({ width: '800px', height: '550px', position: 'absolute', top: 0, left: 0 })

  fabric.Object.prototype.transparentCorners = false;

  var drawingModeEl = $('#drawing-mode')[0],
      drawingOptionsEl = $('#drawing-mode-options')[0],
      drawingColorEl = $('#drawing-color')[0],
      drawingShadowColorEl = $('#drawing-shadow-color')[0],
      drawingLineWidthEl = $('#size')[0],
      drawingShadowWidth = $('#drawing-shadow-width')[0],
      drawingShadowOffset = $('#drawing-shadow-offset')[0],
      undo = $('#undo')[0],
      save = $('#save')[0];
  var clearEl = $('#broom')[0];

  $('.rand-color').click(function(e) {
    colorSelection = e.target.id
    color = $(this).data('color');
    $('#drawing-color').val(color)
    canvas.freeDrawingBrush.color = color;
  });

  $('#drawing-color').on('change',function() {
    $('#' + colorSelection).css('background', $(this).val());
    $('#' + colorSelection).data('color', $(this).val());
  });

  $('#grade').click(function() {
    if (!model) {
      window.alert('Still downloading the judges. Please try again in a minute.');
    }

    var img = new Image;

      img.onload = function(){
        var result = ScaleImage(img.width, img.height, 224, 224, false);
        context.drawImage(img, result.targetleft, result.targettop, result.width, result.height);

        classify(document.getElementById('canvas2')).then(function(results) {
          score = Math.floor((results[0].toPrecision(5) * 1000) + (results[1].toPrecision(5) * 1000)) + 1;
          $('.score').html(score)

          var cuteNum = Math.floor(results[0] * 10);
          $('.text1').html(cuteMessages[cuteNum]);
          var detailNum = Math.floor(results[1] * 10);
          $('.text2').html(detailMessages[detailNum]);

          if (results[2] > results[3] && results[2] > results[4] && results[2] > results[5]) {
            $('.text3').html(lowDetailMessages[getRandomInt(0, lowDetailMessages.length - 1)]);
          }

          if (results[3] > results[2] && results[3] > results[4] && results[3] > results[5]) {
            $('.text3').html(textMessages[getRandomInt(0, textMessages.length - 1)]);
          }

          if (results[4] > results[2] && results[4] > results[3] && results[4] > results[5]) {
            $('.text3').html(scribbleMessages[getRandomInt(0, scribbleMessages.length - 1)]);
          }

          if (results[5] > results[2] && results[5] > results[3] && results[5] > results[4]) {
            $('.text3').html(solidMessages[getRandomInt(0, solidMessages.length - 1)]);

          $('.judges').show();
          console.log(results)

      img.src = canvas.toDataURL();

  $('#idea').click(function() {
    $('.ideas').show();

  $('.another-idea').click(function() {
    randIdea++;
    if (randIdea > ideas.length - 1) { randIdea = 0; }

    var idea = ideas[randIdea];

  $('.another-idea').trigger('click');

  $('.submit-score').click(function() {
    if (!loggedIn) {
      ID.login(idCallback);
      return;

  clearEl.onclick = function() {

  save.onclick = function() {
    if (!loggedIn) {

    var pngSave = canvas.toDataURL('image/png', 1.0);
    ID.submit_image(pngSave, function(res) {
      var r = confirm('Saved to profile. View profile now?');

      if (res.success) {

          Math.random().toString(36).substr(2, 6),
          res.image,
          null,
          function(res2) {  }

  undo.onclick = function() {
    var lastItemIndex = (canvas.getObjects().length - 1);
    var item = canvas.item(lastItemIndex);

    if(item.get('type') === 'path') {
      canvas.remove(item);
      canvas.renderAll();
    }
  }


  if (fabric.PatternBrush) {
    var vLinePatternBrush = new fabric.PatternBrush(canvas);
    vLinePatternBrush.getPatternSrc = function() {

      var patternCanvas = fabric.document.createElement('canvas');
      patternCanvas.width = patternCanvas.height = 10;
      var ctx = patternCanvas.getContext('2d');

      ctx.strokeStyle = color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(0, 5);
      ctx.lineTo(10, 5);
      ctx.closePath();
      ctx.stroke();

      return patternCanvas;
    };

      color = this.value;
      canvas.freeDrawingBrush.color = this.value;
    };

function idCallback(response){
  if (response) {

}

function randomColor() {
  return '#' + Math.floor(Math.random()*16777215).toString(16);
}

function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function ScaleImage(srcwidth, srcheight, targetwidth, targetheight, fLetterBox) {

var result = { width: 0, height: 0, fScaleToTargetWidth: true };

if ((srcwidth <= 0) || (srcheight <= 0) || (targetwidth <= 0) || (targetheight <= 0)) {
    return result;
}

// scale to the target width
var scaleX1 = targetwidth;
var scaleY1 = (srcheight * targetwidth) / srcwidth;

// scale to the target height
var scaleX2 = (srcwidth * targetheight) / srcheight;
var scaleY2 = targetheight;

// now figure out which one we should use
var fScaleOnWidth = (scaleX2 > targetwidth);
if (fScaleOnWidth) {
    fScaleOnWidth = fLetterBox;
}
else {
   fScaleOnWidth = !fLetterBox;
}

if (fScaleOnWidth) {
    result.width = Math.floor(scaleX1);
    result.height = Math.floor(scaleY1);
    result.fScaleToTargetWidth = true;
}
else {
    result.width = Math.floor(scaleX2);
    result.height = Math.floor(scaleY2);
    result.fScaleToTargetWidth = false;
}
result.targetleft = Math.floor((targetwidth - result.width) / 2);
result.targettop = Math.floor((targetheight - result.height) / 2);

return result;
}
