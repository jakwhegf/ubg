<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>shortlife2 (minimal)</title>
  <style>
    body { margin: 0; background: #231F20; }
    #unityContainer { width: 800px; height: 480px; margin: 0 auto; }
    .progress { color: #fff; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div id="unityContainer"></div>
  <div id="progress" class="progress">Loading...</div>

  <script>
    window.InitExternEval = function() {};
    window.Y8ExternEval = function() {};
    window.Y8ExternEvalReward = function() {};
  </script>
  <script src="Build/UnityLoader.js"></script>
  <script>
    function showProgress(gi, p) {
      var el = document.getElementById('progress');
      if (!el) return;
      if (p === 'complete') { el.textContent = ''; el.style.display = 'none'; return; }
      if (typeof p === 'number') el.textContent = 'Loading: ' + Math.floor(p * 100) + '%';
    }
    var unityInstance = UnityLoader.instantiate("unityContainer", "Build/y6.json", {
      onProgress: showProgress,
      Module: { onRuntimeInitialized: function() { showProgress(null, 'complete'); } }
    });
  </script>
</body>
</html>
