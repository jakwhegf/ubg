<html>



<head>

    <title>Super UMO</title>

    <meta charset="utf-8" />

    <meta name="renderer" content="webkit" />

    <meta name="viewport"

        content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="icon" href="fastLoading.jpg" type="image/jpeg" />

    <meta name="full-screen" content="true" />

    <meta name="x5-fullscreen" content="true" />

    <meta name="360-fullscreen" content="true" />

    <meta name="laya" screenorientation="landscape" />

    <meta http-equiv="expires" content="0" />

    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

    <meta http-equiv="expires" content="0" />

<body background="fastLoading.jpg", style="background-size: 100% 100%;background-attachment: fixed;">

    <script type="text/javascript" src="y8miniplay_1.0.0.js"></script>

    <script type="text/javascript">

        window["Y8Game"] = {};



        window.idAsyncInit = function () { // SDK downloaded

            ID.Event.subscribe('id.init', function () { // SDK initialized

                miniplay.initAsync().then(() => {

                    console.log("miniplay init success")

                    

                }).catch((e) => {

                    console.log("miniplay init fail: " + e)

                })

                loadLibs();

            });



            ID.init({

                appId: '6542ed00e694aad177b622cb'

            });

        };

        function loadLib(url) {

            var script = document.createElement("script");

            script.async = false;

            script.src = url;

            document.body.appendChild(script);

        }



        function loadLibs() {



            window.screenOrientation = "landscape";



            //-----libs-begin-----

            loadLib("libs/laya.core.js")

            loadLib("libs/laya.html.js")

            loadLib("libs/laya.ui.js")

            loadLib("libs/laya.d3.js")

            loadLib("libs/laya.physics3D.js")

            loadLib("libs/domparserinone.js")

            //-----libs-end-------

            loadLib("js/regenerator.runtime.js");

            loadLib("js/fairygui.js");

            loadLib("js/seedrandom.js");

            loadLib("js/bundle.js");

        }



    </script>

    <script src="https://cdn.y8.com/api/sdk.js" async></script>

    <!-- <script type="text/javascript" src="index.js"></script> -->

</body>



</html>
